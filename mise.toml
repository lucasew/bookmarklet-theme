[tools]
"github:lucasew/workspaced" = "0.3.6"

[tasks.lint]
run = "workspaced codebase lint"

[tasks.fmt]
run = "workspaced codebase format"

[tasks.test]
depends = ["test:*"]

[tasks.codegen]
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tasks.ci]
depends = ["lint", "test"]
[tasks."test:noop"]
run = "true"

[tasks."codegen:noop"]
run = "true"

[tasks."install:noop"]
run = "true"
